name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (SDK)
        run: pnpm --filter @mangrove-ai/sdk lint

      - name: Type check (Claude Plugin)
        run: pnpm --filter @mangrove-ai/claude-plugin lint

      - name: Test SDK
        run: pnpm --filter @mangrove-ai/sdk test -- --run

      - name: Test Claude Plugin
        run: pnpm --filter @mangrove-ai/claude-plugin test -- --run

      - name: Test OpenClaw Plugin
        run: pnpm --filter @mangrove-ai/openclaw-plugin test -- --run

      - name: Build SDK
        run: pnpm --filter @mangrove-ai/sdk build

      - name: Build Claude Plugin
        run: pnpm --filter @mangrove-ai/claude-plugin build

      - name: Build OpenClaw Plugin
        run: pnpm --filter @mangrove-ai/openclaw-plugin build
